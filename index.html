<body data-page="home">
    <header class="header">
    <div class="header__container container">
        <nav class="header__nav">

            <a href="./index.html" class="header__link header__link_home">Home</a>
        </nav>

</header>
    <section class="top20">
    <div class="container">
        <h1 class="top20__title">Top 20 Films</h1>
        <div class="top20__swiper swiper">
            <ul class="top20__swiper-wraper swiper-wrapper">
                <div class="swiper-slide">
                    <img class="top20__img" src="" alt="img for each film">
                    <div class="top20__subcontainer">
                        <h2 class="top20__film-title"></h2>
                        <div class="top20__raiting raiting">
                            <div class="raiting__body">
                                <div class="raiting__active"></div>
                                <div class="raiting__items">
                                    <input id="raiting__1" class="raiting__item" name="raiting" type="radio" value="1">
                                    <input id="raiting__2" class="raiting__item" name="raiting" type="radio" value="2">
                                    <input id="raiting__3" class="raiting__item" name="raiting" type="radio" value="3">

                                    <input id="raiting__5" class="raiting__item" name="raiting" type="radio" value="5">
                                </div>
                            </div>
                            <p class="raiting__value">3.6</p>
                        </div>
                    </div>

                </div>
            </ul>

            <div class="swiper-button-next swiper-button"></div>
            <div class="swiper-button-prev swiper-button"></div>
            <div class="swiper-pagination"></div>
        </div>
    </div>
</section>
    <section class="bestFilm">
    <div class="container">
        <h2 class="bestFilm__title">Best Film</h2>
